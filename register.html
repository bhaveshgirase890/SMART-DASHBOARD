<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - WanderList 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-card">
      <h1>Create Account</h1>
      <p>Register to access your personal trip dashboard.</p>
      <form id="register-form" class="auth-form" novalidate>
        <label for="name">Full Name</label>
        <input id="name" name="name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" minlength="6" required />

        <label for="confirm-password">Confirm Password</label>
        <input id="confirm-password" name="confirmPassword" type="password" minlength="6" required />

        <p id="auth-error" class="error-message" aria-live="polite"></p>
        <button class="btn-add" type="submit">Register</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
