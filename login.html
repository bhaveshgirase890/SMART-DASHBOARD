<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - WanderList 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-card">
      <h1>Welcome Back</h1>
      <p>Log in to manage your trips and booking history.</p>
      <form id="login-form" class="auth-form" novalidate>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <p id="auth-error" class="error-message" aria-live="polite"></p>
        <button class="btn-add" type="submit">Login</button>
      </form>
      <p class="auth-switch">New user? <a href="register.html">Register</a></p>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
