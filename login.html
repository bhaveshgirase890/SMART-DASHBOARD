<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - WanderList 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-page auth-page">
    <header class="home-topbar">
      <div class="brand">WanderList 2026</div>
      <div class="top-actions">
        <span>INR</span>
        <a href="register.html" class="top-btn">Register</a>
        <a href="login.html" class="top-btn top-btn-outline">Sign in</a>
      </div>
    </header>
    <nav class="home-nav">
      <a href="index.html">Home</a>
      <a href="#">Stays</a>
      <a href="#">Flights</a>
      <a href="#">Packages</a>
      <a href="#">Attractions</a>
    </nav>
    <main class="auth-layout">
      <section class="auth-hero">
        <p class="eyebrow">WanderList 2026</p>
        <h1>Welcome back, traveler!</h1>
        <p>Sign in to continue where you left off and manage your plans in your dashboard.</p>
      </section>
      <section class="auth-card">
      <h2>Login</h2>
      <p class="muted">Log in to manage your trips and booking history.</p>
      <form id="login-form" class="auth-form" novalidate>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <p id="auth-error" class="error-message" aria-live="polite"></p>
        <button class="btn-add" type="submit">Login</button>
      </form>
      <p class="auth-switch">New user? <a href="register.html">Register</a></p>
      </section>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
